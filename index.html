<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Поддержка</title>
		<link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon" />
		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/styles.css?v=1.1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<h1>Техническая поддержка</h1>
			<div class="accordion">
				<!-- Аккордеон Сварочные аппараты -->
				<div class="accordion-item">
					<div class="accordion-header">Сварочные аппараты</div>
					<div class="accordion-content">
						<!-- Вложенный аккордеон для сварочные аппараты -->
						<div class="sub-accordion">
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">HEADUX</div>
								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="img/Cooling activate PROMIG500S.png"
									>
										PROMIG 500S (W) Активация водяного охлаждения (Фото)
									</button>
									<button
										class="pdf-btn"
										data-url="video/Cooling activate PROMIG500S.mp4"
									>
										PROMIG 500S (W) Активация водяного охлаждения (Видео)
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- Аккордеон Лазерная сварка -->
				<div class="accordion-item">
					<div class="accordion-header">Лазерная сварка</div>
					<div class="accordion-content">
						<!-- Вложенный аккордеон для сварки -->
						<div class="sub-accordion">
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">Режимы сварки</div>
								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="docs/SA10-2000H-136_MaintenanceManual_EN.pdf"
									>
										Таблица режимов
									</button>
									<button
										class="pdf-btn"
										data-url="docs/SA10-2000H-136_MaintenanceManual_EN.pdf"
									>
										Рекомендации по выбору
									</button>
								</div>
							</div>
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">Материалы</div>
								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="docs/SA10-2000H-136_MaintenanceManual_EN.pdf"
									>
										Свариваемые материалы
									</button>
									<button
										class="pdf-btn"
										data-url="docs/SA10-2000H-136_MaintenanceManual_EN.pdf"
									>
										Подготовка кромок
									</button>
								</div>
							</div>
						</div>
					</div>
				</div>
				<!-- Аккордеон Лазерная чистка -->
				<div class="accordion-item">
					<div class="accordion-header">Лазерная чистка</div>
					<div class="accordion-content">
						<!-- Вложенный аккордеон для Лазерная чистка -->
						<div class="sub-accordion">
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">
									1S1-C-3000-B-M9-HSUP22C-AF/FA/CD/MP/PS/-NA
								</div>
								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="docs/Лазерная чистка 1S1-C-3000-B-M9-HSUP22C-AFFACDMPPS-NA ПС.pdf"
									>
										Паспорт .pdf
									</button>
									<button
										class="pdf-btn"
										data-url="docs/Лазерная чистка 1S1-C-3000-B-M9-HSUP22C-AFFACDMPPS-NA ПС.docx"

										Паспорт .docx
									</button>
								</div>
							</div>
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">Прошивки HMI</div>
								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="firmware/firmware_ARCUS_new_translate_for FWH60C30A_HMI_14_03_2026.rar"

										Прошивка для HMI FWH60C30A
									</button>
									<button
										class="pdf-btn"

									>
										Прошивка для HMI SUP22C
									</button>
								</div>
							</div>
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">
									Программы для источников BWT

								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="programs/BWT/BWTLaserV7.1.3(2025.10.27).exe"
									>
										BWTLaser (для ПК)
									</button>
									<button
										class="pdf-btn"
										data-url="programs/BWT/LaserControlSoftwareV2.1.9.apk"
									>
										LaserControl (для Android)
									</button>
									<button
										class="pdf-btn"
										data-url="programs/BWT/PL2303_Prolific_DriverInstaller_v1190.rar"
									>
										PL2303 Driver (для ПК)
									</button>
									<button
										class="pdf-btn"
										data-url="programs/BWT/USBtoRS232.exe"
									>
										USBtoRS232 Driver (для ПК)
									</button>
								</div>
							</div>
							<div class="sub-accordion-item">
								<div class="sub-accordion-header">Видео BWT</div>
								<div class="sub-accordion-content">
									<button
										class="pdf-btn"
										data-url="video/Задняя панель источника.mp4"
									>
										Задняя панель источника
									</button>
									<button
										class="pdf-btn"
										data-url="video/Монтаж источника и оптики.mp4"
									>
										Монтаж источника и оптики
									</button>
									<button
										class="pdf-btn"
										data-url="video/Подключение к источнику через Bluetooth.mp4"
									>
										Подключение к источнику через Bluetooth
									</button>
									<button
										class="pdf-btn"
										data-url="video/Подключение к источнику через ПК.mp4"
									>
										Подключение к источнику через ПК
									</button>
									<button
										class="pdf-btn"
										data-url="video/Распаковка источника.mp4"
									>
										Распаковка источника
									</button>
									<button
										class="pdf-btn"
										data-url="video/Срок действия источника через bluetooth.mp4"
									>
										Продление срока источника Bluetooth
									</button>
